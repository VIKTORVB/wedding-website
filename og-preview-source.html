<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'WeddingHeader';
    src: url('fonts/TT Ricordi Trial Nobili.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #635d1f;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #f9eee0;
    gap: 0;
  }
  .names {
    font-family: 'WeddingHeader', 'Georgia', serif;
    font-size: 112px;
    font-weight: 400;
    line-height: 1.08;
    letter-spacing: 0.01em;
    margin-bottom: 28px;
  }
  .tagline {
    font-family: 'Garamond', 'Georgia', serif;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.82;
    margin-bottom: 32px;
  }
  .date {
    font-family: 'Garamond', 'Georgia', serif;
    font-size: 28px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="names">Симона &amp; Виктор</div>
    <div class="tagline">ще се женят</div>
    <div class="date">19 септември 2026</div>
  </div>
</body>
</html>
